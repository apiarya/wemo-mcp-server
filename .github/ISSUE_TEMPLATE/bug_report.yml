name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using the latest version of wemo-mcp-server
          required: true
        - label: I have read the [documentation](https://github.com/apiarya/wemo-mcp-server/blob/main/README.md)
          required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of wemo-mcp-server are you using?
      placeholder: "e.g., 1.1.1"
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation Method
      description: How did you install wemo-mcp-server?
      options:
        - pip install wemo-mcp-server
        - uvx wemo-mcp-server
        - git clone (development)
        - Other
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - VS Code
        - Cursor
        - Cline (VS Code extension)
        - Windsurf
        - Zed
        - Continue (VS Code extension)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: Describe what happened vs what you expected to happen
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure MCP client with...
        2. Send prompt "..."
        3. Server responds with...
        4. Error occurs...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected outcome
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually occurred
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (MCP server logs from stderr)
      placeholder: Paste logs here
      render: shell

  - type: textarea
    id: mcp-config
    attributes:
      label: MCP Configuration
      description: Your MCP client configuration (remove sensitive data!)
      placeholder: |
        {
          "mcpServers": {
            "wemo": {
              "command": "uvx",
              "args": ["wemo-mcp-server"]
            }
          }
        }
      render: json

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Additional environment details
      placeholder: |
        - OS: [e.g., macOS 14.0, Windows 11, Ubuntu 22.04]
        - Python version: [e.g., 3.10.5]
        - Number of WeMo devices: [e.g., 5]
        - Network setup: [e.g., single subnet, multiple VLANs]
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information
      placeholder: Add any other context about the problem here

  - type: checkboxes
    id: security
    attributes:
      label: Security
      description: Security-related questions
      options:
        - label: This bug might be a security vulnerability
          required: false
